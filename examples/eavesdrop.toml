root_dir = "."
tmp = false
cleanup_tmp = false

[global_exclude]
ops = [ "CHMOD" ]
dirs = [ "data", "dist", "node_modules", "tmp" ]
files = [ ]
regex = [
  "^\\.?(\\/?|\\\\?)(?:\\w+(\\/|\\\\))*(\\.\\w+)$",
  "^.+\\.sqlite$",
  "^.+\\.wal$",
  "^.+\\.shm$"
]

[[watchers]]
name = "go watcher"
filetypes = [ ".go" ]
dirs = [ ]
files = [ ]
run_on_start = true
trigger_refresh = false
refresh_delay = 100

  [watchers.exclude]
  ops = [ ]
  dirs = [ ]
  files = [ ]
  regex = [ "_test\\.go" ]

  [watchers.shell]
  tasks = [ "go run main.go" ]
  task_timeout = 2_000
  service = ""
  service_shutdown_timeout = 5_000
  debounce_delay = 100

[proxy]
enabled = false
app_port = 8_000
proxy_port = 8_001
